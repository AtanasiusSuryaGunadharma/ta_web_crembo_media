{% extends 'base.html' %}

{% block title %}Selamat Datang{% endblock %}

{% block content %}

<!-- SLIDER LANDING PAGE 
<div class="slider-container"> -->
<div style="text-align:center; margin-top:20px;">
    <img src="{{ url_for('static', filename='slider/slier2.jpg') }}" 
         style="max-width:800px; width:80%; border-radius:10px; box-shadow:4px 4px 10px rgba(0,0,0,0.3);">
</div>
<!-- </div>
 -->
<div class="landing"> 
    <center>
        <h2>Selamat Datang di Portal Crew Multimedia Baciro</h2>
         <div id="pengumuman-link-slot"></div>

    </center> 
</div> 

<script>
(async function(){
  const slot = document.getElementById('pengumuman-link-slot');
  if (!slot) return;

  try {
    const res = await fetch('/api/pengumuman/status', { cache: 'no-store' });
    const data = await res.json();

    // bersihkan slot dulu
    slot.innerHTML = '';

    if (!data.active) {
      // kalau tidak ada yang aktif, slot kosong = link hilang total
      return;
    }

    // kalau ada yang aktif, tampilkan 1 link saja
    const a = document.createElement('a');
    a.href = data.url || '/pengumuman';
    a.textContent = 'Pengumuman Jadwal Petugas';
    a.style.display = 'inline-block';
    a.style.padding = '10px 14px';
    a.style.border = '1px solid #ddd';
    a.style.borderRadius = '12px';
    a.style.textDecoration = 'none';
    a.style.fontWeight = '700';

    slot.appendChild(a);

  } catch(e) {
    // kalau API gagal, jangan bikin landing error. diam saja.
    console.log('Pengumuman check failed:', e);
  }
})();
</script>


{% endblock %}
