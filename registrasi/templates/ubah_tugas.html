<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ubah Jadwal Tugas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }
        form {
            display: inline-block;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input, select {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h2>Ubah Jadwal Tugas</h2>
    <form method="POST">
        <label>Tanggal Baru:</label>
        <input type="date" name="date" required value="{{ date }}">

        <label>Jam Baru:</label>
        <input type="time" name="time" required value="{{ time }}">

        <label>Posisi Baru:</label>
        <select name="position" required>
            <option value="Operator" {% if position == 'Operator' %}selected{% endif %}>Operator</option>
            <option value="Kameramen" {% if position == 'Kameramen' %}selected{% endif %}>Kameramen</option>
            <option value="Supervisor" {% if position == 'Supervisor' %}selected{% endif %}>Supervisor</option>
        </select>

        <button type="submit">Simpan Perubahan</button>
    </form>

    <p><a href="{{ url_for('register') }}">Kembali ke Registrasi</a></p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
</body>
</html>
