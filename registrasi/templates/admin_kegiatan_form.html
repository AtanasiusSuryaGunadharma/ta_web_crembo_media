{% extends "base.html" %}
{% block content %}

<h2>{{ 'Edit Kegiatan' if kegiatan else 'Tambah Kegiatan' }}</h2>

<form method="POST" action="">
  <div style="margin-bottom:12px;">
    <label>Judul Kegiatan</label><br>
    <input type="text" name="judul" required style="width:100%;"
           value="{{ kegiatan.judul if kegiatan else '' }}">
  </div>

  <div style="margin-bottom:12px;">
    <label>Tanggal</label><br>
    <input type="date" name="tanggal" required
           value="{{ kegiatan.tanggal if kegiatan else '' }}">
  </div>

  <hr>

  <div style="display:flex; justify-content:space-between; align-items:center; margin:12px 0;">
    <h3 style="margin:0;">Daftar Misa</h3>
    <button type="button" onclick="addMisaRow()">+ Tambah Misa</button>
  </div>

  <div id="misa-container"></div>

  <hr style="margin:16px 0;">

  <div style="display:flex; gap:10px;">
    <button type="submit" name="action" value="draft">Simpan Draft</button>
    <button type="submit" name="action" value="publish">Publish</button>
  </div>
</form>

<script>
const misaContainer = document.getElementById('misa-container');

// anggotaOptions dari backend (username + nama)
const anggotaOptions = {{ anggota_options|tojson }};
const initialMisa = {{ misa_list|tojson if misa_list else "[]" }};

function buildUserSelect(nameAttr, selectedUsername="") {
  const sel = document.createElement('select');
  sel.name = nameAttr;
  sel.style.width = '100%';

  // opsi kosong
  const opt0 = document.createElement('option');
  opt0.value = "";
  opt0.textContent = "-- pilih --";
  sel.appendChild(opt0);

  anggotaOptions.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.username;
    // tampilkan username (nama) biar admin tidak salah pilih
    opt.textContent = u.nama ? `${u.username} (${u.nama})` : u.username;
    if (selectedUsername && selectedUsername === u.username) opt.selected = true;
    sel.appendChild(opt);
  });

  return sel;
}

// multi dropdown: bisa tambah beberapa select untuk role yang sama
function buildMultiSelectGroup(namePrefix, selectedList=[]) {
  // namePrefix contoh: kamera[0][]
  const wrap = document.createElement('div');

  function addOne(selected="") {
    const row = document.createElement('div');
    row.style.display = 'grid';
    row.style.gridTemplateColumns = '1fr auto';
    row.style.gap = '6px';
    row.style.marginBottom = '6px';

    const sel = buildUserSelect(namePrefix, selected);

    const del = document.createElement('button');
    del.type = 'button';
    del.textContent = 'Hapus';
    del.onclick = () => row.remove();

    row.appendChild(sel);
    row.appendChild(del);
    wrap.appendChild(row);
  }

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.textContent = '+ Tambah';
  addBtn.style.marginTop = '6px';
  addBtn.onclick = () => addOne("");

  // isi awal
  if (selectedList && selectedList.length > 0) {
    selectedList.forEach(x => addOne(x));
  } else {
    addOne(""); // minimal 1 baris biar nggak kosong
  }

  wrap.appendChild(addBtn);
  return wrap;
}

function addMisaRow(prefill=null) {
  const idx = document.querySelectorAll('.misa-card').length;

  const card = document.createElement('div');
  card.className = 'misa-card';
  card.style.border = '1px solid #ddd';
  card.style.padding = '12px';
  card.style.marginBottom = '12px';
  card.style.borderRadius = '10px';

  const header = document.createElement('div');
  header.style.display = 'flex';
  header.style.justifyContent = 'space-between';
  header.style.alignItems = 'center';

  const title = document.createElement('strong');
  title.textContent = `Misa #${idx+1}`;

  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.textContent = 'Hapus Misa';
  delBtn.onclick = () => {
    card.remove();
    renumberCards();
  };

  header.appendChild(title);
  header.appendChild(delBtn);
  card.appendChild(header);

  const grid = document.createElement('div');
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = 'repeat(2, 1fr)';
  grid.style.gap = '10px';
  grid.style.marginTop = '10px';

  function addField(labelText, inputEl) {
    const wrap = document.createElement('div');
    const label = document.createElement('label');
    label.textContent = labelText;
    label.style.display = 'block';
    label.style.marginBottom = '4px';
    wrap.appendChild(label);
    wrap.appendChild(inputEl);
    grid.appendChild(wrap);
  }

  // misa_ke
  const misaKe = document.createElement('input');
  misaKe.type = 'number';
  misaKe.min = '1';
  misaKe.name = 'misa_ke[]';
  misaKe.required = true;
  misaKe.value = prefill?.misa_ke ?? (idx+1);

  // jam
  const jam = document.createElement('input');
  jam.type = 'time';
  jam.name = 'jam[]';
  jam.required = true;
  jam.value = prefill?.jam ?? '';

  // DP/OP/vMix single dropdown
  const dpSel   = buildUserSelect('dp_username[]',   prefill?.dp_username ?? "");
  const opSel   = buildUserSelect('op_username[]',   prefill?.op_username ?? "");
  const vmixSel = buildUserSelect('vmix_username[]', prefill?.vmix_username ?? "");

  addField('Misa ke-', misaKe);
  addField('Jam', jam);
  addField('DP', dpSel);
  addField('OP', opSel);
  addField('vMix', vmixSel);

  // Multi roles (per misa)
  const kameraWrap = buildMultiSelectGroup(`kamera[${idx}][]`, prefill?.kamera ?? []);
  const supWrap    = buildMultiSelectGroup(`supervisor[${idx}][]`, prefill?.supervisor ?? []);
  const fotoWrap   = buildMultiSelectGroup(`fotografer[${idx}][]`, prefill?.fotografer ?? []);

  const full = document.createElement('div');
  full.style.marginTop = '10px';
  full.innerHTML = `
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; font-weight:600; margin-bottom:6px;">
      <div>Kamera</div>
      <div>Supervisor</div>
      <div>Fotografer</div>
    </div>
  `;

  const three = document.createElement('div');
  three.style.display = 'grid';
  three.style.gridTemplateColumns = 'repeat(3, 1fr)';
  three.style.gap = '10px';

  three.appendChild(kameraWrap);
  three.appendChild(supWrap);
  three.appendChild(fotoWrap);

  card.appendChild(grid);
  full.appendChild(three);
  card.appendChild(full);

  misaContainer.appendChild(card);
  renumberCards();
}

function renumberCards() {
  const cards = document.querySelectorAll('.misa-card');
  cards.forEach((c, i) => {
    c.querySelector('strong').textContent = `Misa #${i+1}`;
  });
}

// init
if (initialMisa.length > 0) {
  initialMisa.forEach(m => addMisaRow(m));
} else {
  addMisaRow();
}
</script>

{% endblock %}
