<h2>Profil Pengguna</h2>

<table>
    <tr>
        <td><strong>Nama</strong></td>
        <td>{{ nama }}</td>
    </tr>
    <tr>
        <td><strong>Username</strong></td>
        <td>{{ username }}</td>
    </tr>
    <tr>
        <td><strong>Tanggal Lahir</strong></td>
        <td>{{ tgl_lahir or 'Belum diisi' }}</td>
    </tr>
    <tr>
        <td><strong>No. Telepon</strong></td>
        <td>{{ telp or 'Belum diisi' }}</td>
    </tr>
</table>

<br>
<a href="{{ url_for('update_profil') }}">Update Profil</a>
