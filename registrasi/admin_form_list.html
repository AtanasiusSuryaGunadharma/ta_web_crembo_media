<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Daftar Form Tugas</title>
</head>
<body>
  <h1>Daftar Form Tugas</h1>

  {% if forms and forms|length > 0 %}
    <ul>
      {% for f in forms %}
        <li>
          {{ f.title if f.title is defined else f.get('title','(tanpa judul)') }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>Belum ada form.</p>
  {% endif %}
</body>
</html>
