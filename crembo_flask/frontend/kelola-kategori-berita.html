<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kelola Kategori Berita - Crembo Media</title>
  <style>
    :root {
      --bg: #ececec;
      --panel: #ffffff;
      --line: #1f1f1f;
      --muted: #5b5b5b;
      --text: #111111;
      --side-text: #f4f4f4;
      --radius: 14px;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #f8f8f8 0%, #ececec 38%, #e3e3e3 100%);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #181818 0%, #0f0f0f 100%);
      color: var(--side-text);
      border-right: 2px solid var(--line);
      padding: 18px 14px;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      border: 1px solid #838383;
      background: rgba(255, 255, 255, 0.04);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .brand h1 { margin: 0; font-size: 1rem; text-transform: uppercase; }
    .brand p { margin: 6px 0 0; color: #cdcdcd; font-size: 0.82rem; }

    .menu-group {
      border: 1px solid #656565;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .group-toggle {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: var(--side-text);
      font-weight: 700;
      font-size: 0.88rem;
      padding: 11px 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .group-items {
      display: block;
      border-top: 1px solid #525252;
      padding: 6px;
      background: rgba(255, 255, 255, 0.02);
    }

    .menu-link {
      display: block;
      text-decoration: none;
      color: #e5e5e5;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.83rem;
      margin-bottom: 4px;
    }

    .menu-link.active {
      border-color: #cfcfcf;
      background: #e9e9e9;
      color: #151515;
      font-weight: 700;
    }

    .side-actions {
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .side-actions a {
      text-decoration: none;
      border: 1px solid #8d8d8d;
      color: #ebebeb;
      text-align: center;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 0.82rem;
    }

    .main { padding: 16px; }

    .container {
      display: grid;
      gap: 12px;
    }

    .meta-header {
      border: 1px solid #cfcfcf;
      background: #f3f3f3;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .meta-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .meta-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border: 1px solid #1f1f1f;
      background: #fafafa;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .world-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid #6b7280;
      background: #fff;
      color: #374151;
      text-decoration: none;
    }

    .world-link svg {
      width: 18px;
      height: 18px;
    }

    .headline {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .headline-main {
      display: grid;
      gap: 4px;
      min-width: 240px;
      flex: 1 1 320px;
    }

    .headline-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .headline h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      color: #fff;
    }

    .headline p {
      margin: 6px 0 0;
      color: rgba(255, 255, 255, 0.86);
    }

    .headline .btn.ghost {
      min-height: 36px;
      padding: 7px 14px;
      white-space: nowrap;
      border-color: rgba(255, 255, 255, 0.35);
      color: #fff;
      background: rgba(255, 255, 255, 0.14);
    }

    .headline .btn.ghost:hover {
      background: rgba(255, 255, 255, 0.24);
      border-color: rgba(255, 255, 255, 0.52);
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      align-items: start;
    }

    .panel {
      border: 1px solid #d1d5db;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #374151;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 0.88rem;
      font-family: inherit;
      background: #fff;
    }

    textarea { min-height: 90px; resize: vertical; }

    .btn {
      border: 1px solid #1f2937;
      border-radius: 9px;
      background: linear-gradient(180deg, #4b5563 0%, #1f2937 100%);
      color: #fff;
      font-weight: 700;
      padding: 8px 11px;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .btn.primary {
      background: linear-gradient(180deg, #3b7df8 0%, #2f66d8 100%);
      border-color: #2f66d8;
    }

    .btn.ghost {
      background: #fff;
      color: #1f2937;
      border-color: #9ca3af;
      font-weight: 600;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      display: grid;
      gap: 6px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .card h3 { margin: 0; font-size: 1.2rem; }

    .slug { color: #6b7280; font-size: 0.82rem; }
    .desc { color: #374151; font-size: 0.88rem; margin: 0; }

    .order {
      border: 1px solid #bfdbfe;
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 0.73rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: #2563eb;
      font-weight: 700;
      padding: 0;
      cursor: pointer;
      font-size: 0.82rem;
    }

    .link-btn.delete { color: #dc2626; }

    .notify {
      position: fixed;
      right: 18px;
      bottom: 18px;
      border: 1px solid #cfe0ff;
      background: #f1f6ff;
      color: #1e3a8a;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 40;
    }

    .notify.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
    }
  </style>
  <link rel="stylesheet" href="_admin-theme.css">
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar dashboard">
      <div class="brand">
        <h1>Crembo Media Panel</h1>
        <p>Kelola pengumuman, kategori, dan publikasi berita</p>
      </div>

      <div class="menu-group">
        <button class="group-toggle" type="button">Informasi & Publikasi <span>-</span></button>
        <div class="group-items">
          <a class="menu-link" href="manajemen-profil.html">Profil</a>
          <a class="menu-link active" href="kelola-berita.html">Pengumuman</a>
          <a class="menu-link" href="manajemen-agenda.html">Agenda Kegiatan</a>
          <a class="menu-link" href="manajemen-form-pendaftaran.html">Form Pendaftaran</a>
        </div>
      </div>

      <div class="side-actions">
        <a href="kelola-berita.html">Kembali ke Daftar Berita</a>
        <a href="dashboard.html">Kembali ke Dashboard</a>
      </div>
    </aside>

    <main class="main">
      <section class="container">
        <header class="headline">
          <div class="headline-main">
            <button id="mobileSidebarBtn" class="mobile-toggle" type="button">Menu</button>
            <h1>Kelola Kategori Berita</h1>
            <p>Tambah, edit, dan hapus kategori untuk artikel pengumuman.</p>
          </div>
          <div class="headline-actions">
            <!-- <a class="btn ghost" href="kelola-berita.html">Kembali ke Berita</a> -->
            <span id="liveDateTime" class="chip">-</span>
            <a class="world-link" href="home.html?session=active" title="Kembali ke Home (tetap login)">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"></circle>
                <path d="M3 12H21" stroke="currentColor" stroke-width="1.8"></path>
                <path d="M12 3C14.3 5.5 15.6 8.7 15.6 12C15.6 15.3 14.3 18.5 12 21" stroke="currentColor" stroke-width="1.8"></path>
                <path d="M12 3C9.7 5.5 8.4 8.7 8.4 12C8.4 15.3 9.7 18.5 12 21" stroke="currentColor" stroke-width="1.8"></path>
              </svg>
            </a>
          </div>
        </header>

        <section class="grid">
          <article class="panel">
            <h2 id="formTitle">Tambah Kategori</h2>
            <form id="categoryForm" style="display:grid;gap:8px;">
          <div class="field">
            <label class="label" for="nameInput">Nama Kategori</label>
            <input id="nameInput" type="text" placeholder="Contoh: Umum, Akademik" required>
          </div>
          <div class="field">
            <label class="label" for="slugInput">Slug</label>
            <input id="slugInput" type="text" placeholder="Auto dari nama jika kosong">
          </div>
          <div class="field">
            <label class="label" for="descInput">Deskripsi</label>
            <textarea id="descInput" placeholder="Deskripsi singkat kategori"></textarea>
          </div>
          <div class="field">
            <label class="label" for="orderInput">Urutan</label>
            <input id="orderInput" type="number" min="0" step="1" value="0">
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn primary" type="submit">Simpan Kategori</button>
            <button id="cancelEditBtn" class="btn ghost" type="button">Batal</button>
          </div>
            </form>
          </article>

          <section id="categoryCards" class="cards" aria-label="Daftar kategori"></section>
        </section>
      </section>
    </main>
  </div>

  <div id="notify" class="notify" role="status" aria-live="polite"></div>

  <script>
    const categoryForm = document.getElementById("categoryForm");
    const nameInput = document.getElementById("nameInput");
    const slugInput = document.getElementById("slugInput");
    const descInput = document.getElementById("descInput");
    const orderInput = document.getElementById("orderInput");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const categoryCards = document.getElementById("categoryCards");
    const liveDateTime = document.getElementById("liveDateTime");
    const notify = document.getElementById("notify");
    const formTitle = document.getElementById("formTitle");

    let categories = [];
    let editingId = "";

    function showNotify(message) {
      notify.textContent = message;
      notify.classList.add("show");
      setTimeout(() => notify.classList.remove("show"), 3000);
    }

    function slugify(text) {
      return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_-]+/g, '-').replace(/^-+|-+$/g, '');
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return (text || '').replace(/[&<>"']/g, m => map[m]);
    }

    function updateLiveDateTime() {
      const now = new Date();
      liveDateTime.textContent = now.toLocaleDateString('id-ID', { 
        weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    async function loadCategories() {
      try {
        const res = await fetch("/api/news-categories");
        categories = await res.json();
        renderCards();
      } catch (err) {
        showNotify("Error: " + err.message);
      }
    }

    function renderCards() {
      categoryCards.innerHTML = categories.map(cat => `
        <div class="card">
          <div class="card-head">
            <div>
              <h3>${escapeHtml(cat.name)}</h3>
              <p class="slug">${escapeHtml(cat.slug)}</p>
              ${cat.description ? `<p class="desc">${escapeHtml(cat.description)}</p>` : ''}
            </div>
          </div>
          <div class="actions">
            <button type="button" class="link-btn" data-edit="${cat.id}">Edit</button>
            <button type="button" class="link-btn delete" data-delete="${cat.id}">Hapus</button>
          </div>
        </div>
      `).join('');

      categoryCards.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => openEdit(btn.getAttribute('data-edit')));
      });

      categoryCards.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteCategory(btn.getAttribute('data-delete')));
      });
    }

    function resetForm() {
      categoryForm.reset();
      editingId = "";
      formTitle.textContent = "Kategori Baru";
      cancelEditBtn.style.display = "none";
      nameInput.focus();
    }

    function openEdit(id) {
      const cat = categories.find(c => c.id === id);
      if (!cat) return;
      editingId = id;
      nameInput.value = cat.name;
      slugInput.value = cat.slug;
      descInput.value = cat.description || '';
      orderInput.value = cat.order;
      formTitle.textContent = "Edit Kategori";
      cancelEditBtn.style.display = "block";
      nameInput.focus();
    }

    async function deleteCategory(id) {
      if (!confirm("Hapus kategori ini?")) return;
      try {
        const res = await fetch(`/api/news-categories/${id}`, { method: "DELETE" });
        const result = await res.json();
        if (result.success) {
          showNotify("Kategori berhasil dihapus");
          loadCategories();
        } else {
          showNotify("Error: " + (result.error || "Gagal menghapus"));
        }
      } catch (err) {
        showNotify("Error: " + err.message);
      }
    }

    categoryForm.addEventListener("submit", async function(e) {
      e.preventDefault();
      const name = nameInput.value.trim();
      if (!name) {
        showNotify("Nama kategori harus diisi");
        return;
      }

      const payload = {
        name: name,
        slug: slugInput.value.trim() || slugify(name),
        description: descInput.value.trim(),
        order: parseInt(orderInput.value) || 0
      };

      try {
        const url = editingId ? `/api/news-categories/${editingId}` : "/api/news-categories";
        const method = editingId ? "PUT" : "POST";
        const res = await fetch(url, {
          method: method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.success) {
          showNotify(editingId ? "Kategori berhasil diperbarui" : "Kategori berhasil ditambahkan");
          resetForm();
          loadCategories();
        } else {
          showNotify("Error: " + (result.error || "Gagal menyimpan"));
        }
      } catch (err) {
        showNotify("Error: " + err.message);
      }
    });

    cancelEditBtn.addEventListener("click", resetForm);
    nameInput.addEventListener("input", function() {
      if (!slugInput.value || editingId === "") {
        slugInput.value = slugify(this.value);
      }
    });

    loadCategories();
    updateLiveDateTime();
    setInterval(updateLiveDateTime, 1000);
  </script>
  <script src="_sidebar-fix.js"></script>
</body>
</html>
