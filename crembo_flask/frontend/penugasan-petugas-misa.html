<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Penugasan Petugas Misa - Crembo Media</title>
  <style>
    :root {
      --bg: #ececec;
      --panel: #ffffff;
      --line: #1f1f1f;
      --text: #111111;
      --side-text: #f4f4f4;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text); background: radial-gradient(circle at 20% 10%, #f8f8f8 0%, #ececec 38%, #e3e3e3 100%);
      min-height: 100vh;
    }
    .layout { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
    .sidebar {
      background: linear-gradient(180deg, #181818 0%, #0f0f0f 100%);
      color: var(--side-text); border-right: 2px solid var(--line);
      padding: 18px 14px; position: sticky; top: 0; height: 100vh;
    }
    .brand { border: 1px solid #838383; background: rgba(255,255,255,0.04); padding: 12px; border-radius: 12px; margin-bottom: 16px; }
    .brand h1 { margin: 0; font-size: 1rem; text-transform: uppercase; }
    .brand p { margin: 6px 0 0; color: #cdcdcd; font-size: 0.82rem; }
    .menu-group { border: 1px solid #656565; border-radius: 12px; background: rgba(255,255,255,0.03); margin-bottom: 10px; overflow: hidden; }
    .group-toggle { width: 100%; text-align: left; border: 0; background: transparent; color: var(--side-text); font-weight: 700; font-size: 0.88rem; padding: 11px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .group-items { display: block; border-top: 1px solid #525252; padding: 6px; background: rgba(255,255,255,0.02); }
    .menu-link { display: block; text-decoration: none; color: #e5e5e5; border: 1px solid transparent; border-radius: 10px; padding: 8px 10px; font-size: 0.83rem; margin-bottom: 4px; }
    .menu-link.active { border-color: #cfcfcf; background: #e9e9e9; color: #151515; font-weight: 700; }
    .main { padding: 16px; min-width: 0; }
    .dashboard-headline-bar { border: 1px solid #cfcfcf; background: #f3f3f3; border-radius: 12px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .dashboard-headline-bar h1 { margin: 0; font-size: clamp(1.2rem, 2.2vw, 2rem); font-weight: 700; color: #1c1f27; }
    .toolbar, .panel { border: 2px solid var(--line); border-radius: var(--radius); background: var(--panel); box-shadow: var(--shadow); padding: 12px; margin-bottom: 12px; }
    .toolbar-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 0.85rem; font-weight: 700; }
    input, select { border: 1px solid #bdbdbd; border-radius: 8px; padding: 8px; font-size: 0.88rem; font-family: inherit; width: 100%; }
    .btn { border-radius: 9px; font-weight: 700; padding: 8px 12px; font-size: 0.82rem; cursor: pointer; border: 1px solid var(--line); background: linear-gradient(180deg, #4b5563 0%, #1f2937 100%); color: #fff; }
    .table-wrap { overflow-x: auto; border: 1px solid #cbcbcb; border-radius: 10px; background: #fff; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; min-width: 1000px; }
    th, td { border: 1px solid #d1d1d1; padding: 10px; text-align: left; vertical-align: middle; }
    th { background: #f1f1f1; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.02em; }
    select.member-select { border-color: #ddd; background: #fdfdfd; font-size: 0.8rem; cursor: pointer; padding: 5px; }
    select.member-select:focus { border-color: #111; outline: none; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><h1>Crembo Media Admin</h1><p>Panel Penugasan Petugas</p></div>
      <div class="menu-group open">
        <button class="group-toggle" type="button">Streaming <span>-</span></button>
        <div class="group-items">
          <a class="menu-link" href="jadwal-tugas-streaming-admin.html">Jadwal Streaming</a>
          <a class="menu-link active" href="#">Penugasan Petugas Misa</a>
        </div>
      </div>
      <div style="margin-top: 20px;"><a href="dashboard.html" class="menu-link" style="border:1px solid #555; text-align:center;">Kembali</a></div>
    </aside>

    <main class="main">
      <header class="dashboard-headline-bar">
        <h1>Penugasan Petugas Misa</h1>
        <div id="liveDateTime" style="font-weight: 600;">-</div>
      </header>

      <section class="toolbar">
        <div class="toolbar-grid">
          <div class="field"><label>Bulan</label><select id="monthFilter"><option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option><option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option><option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option><option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option></select></div>
          <div class="field"><label>Tahun</label><select id="yearFilter"><option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option></select></div>
          <button class="btn" id="saveAllBtn">Simpan Semua Penugasan</button>
        </div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table id="assignmentTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableRows"></tbody>
          </table>
        </div>
        <p id="emptyNote" style="text-align:center; padding:20px; color:#666;">Memuat data...</p>
      </section>
    </main>
  </div>

  <script>
    let ROLES = [];
    let ACTIVE_MEMBERS = [];
    let SAVED_ASSIGNMENTS = [];
    const monthFilter = document.getElementById("monthFilter");
    const yearFilter = document.getElementById("yearFilter");

    const now = new Date();
    monthFilter.value = now.getMonth() + 1;
    yearFilter.value = now.getFullYear();

    async function fetchData() {
        try {
            const [rolesRes, membersRes, assignmentsRes] = await Promise.all([
                fetch("/api/streaming/roles"),
                fetch("/api/streaming/active-members"),
                fetch("/api/streaming/assignments")
            ]);
            ROLES = await rolesRes.json();
            ACTIVE_MEMBERS = await membersRes.json();
            SAVED_ASSIGNMENTS = await assignmentsRes.json();
            
            renderHeader();
            loadSchedule();
        } catch (e) { console.error("Error fetching data:", e); }
    }

    function renderHeader() {
        let html = `<tr><th>TANGGAL & PERAYAAN</th><th>JAM</th>`;
        ROLES.forEach(r => { html += `<th>${r.name.toUpperCase()}</th>`; });
        html += `</tr>`;
        document.getElementById("tableHeader").innerHTML = html;
    }

    async function loadSchedule() {
        const m = monthFilter.value;
        const y = yearFilter.value;
        const res = await fetch(`/api/streaming/schedule?month=${m}&year=${y}`);
        const data = await res.json();
        
        if (data.success && data.schedule.length > 0) {
            document.getElementById("emptyNote").hidden = true;
            renderRows(data.schedule);
        } else {
            document.getElementById("tableRows").innerHTML = "";
            document.getElementById("emptyNote").hidden = false;
            document.getElementById("emptyNote").innerText = "Tidak ada jadwal rutin bulan ini.";
        }
    }

    function renderRows(schedule) {
        document.getElementById("tableRows").innerHTML = schedule.map(item => {
            let rowHtml = `<td><strong>${item.dayName}</strong>, ${item.date.split('-').reverse().join('/')}<br><small>${item.massName}</small></td>
                           <td style="font-weight:bold; color:#7f0000;">${item.time}</td>`;
            
            ROLES.forEach(role => {
                // Cari apakah sudah ada petugas yang tersimpan untuk slot ini
                const assigned = SAVED_ASSIGNMENTS.find(a => 
                    a.schedule_date === item.date && 
                    a.schedule_time.substring(0,5) === item.time && 
                    a.role_name === role.name
                );

                let options = `<option value="">-- Pilih Petugas --</option>`;
                ACTIVE_MEMBERS.forEach(m => {
                    const selected = assigned && String(assigned.member_id) === String(m.id) ? "selected" : "";
                    options += `<option value="${m.id}" ${selected}>${m.name} (${m.role})</option>`;
                });

                rowHtml += `<td><select class="member-select" data-date="${item.date}" data-time="${item.time}" data-role="${role.name}">${options}</select></td>`;
            });

            return `<tr>${rowHtml}</tr>`;
        }).join("");
    }

    document.getElementById("saveAllBtn").onclick = async () => {
        const selects = document.querySelectorAll(".member-select");
        const payload = [];
        
        selects.forEach(sel => {
            if (sel.value) {
                payload.push({
                    date: sel.getAttribute("data-date"),
                    time: sel.getAttribute("data-time"),
                    role: sel.getAttribute("data-role"),
                    memberId: sel.value
                });
            }
        });

        if (payload.length === 0) return alert("Belum ada petugas yang dipilih.");

        const res = await fetch("/api/streaming/assignments/save", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(data.success) {
            alert("Semua penugasan berhasil disimpan!");
            fetchData(); // Refresh data
        } else {
            alert("Gagal menyimpan: " + data.error);
        }
    };

    monthFilter.onchange = loadSchedule;
    yearFilter.onchange = loadSchedule;

    setInterval(() => {
        const n = new Date();
        document.getElementById("liveDateTime").textContent = n.toLocaleString('id-ID', { weekday:'long', day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }) + " WIB";
    }, 1000);

    fetchData();
  </script>
</body>
</html>
